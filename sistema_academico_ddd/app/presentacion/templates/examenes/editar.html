{% extends "base.html" %}
{% block titulo %}Editar examen - Sistema Academico{% endblock %}

{% block contenido %}
<h1>Editar examen #{{ examen.id }}</h1>

<form class="formulario-simple" action="{{ url_for('examen.actualizar', examen_id=examen.id) }}" method="post">
    <div>
        <label for="titulo">Titulo</label>
        <input type="text" id="titulo" name="titulo" value="{{ examen.titulo }}" required>
    </div>
    <div>
        <label for="materia_id">Materia</label>
        <select id="materia_id" name="materia_id" required>
            {% for materia in materias %}
                <option value="{{ materia.id }}" {% if materia.id == examen.materia_id %}selected{% endif %}>{{ materia.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="numero_preguntas">N&deg; preguntas</label>
        <input type="number" id="numero_preguntas" name="numero_preguntas" min="1" value="{{ examen.numero_preguntas }}" required>
    </div>
    <div>
        <label for="numero_alternativas">N&deg; alternativas</label>
        <input type="number" id="numero_alternativas" name="numero_alternativas" min="2"
               value="{{ examen.configuracion.numero_alternativas if examen.configuracion else 4 }}">
    </div>
    <div>
        <label for="puntaje_por_pregunta">Puntaje/pregunta</label>
        <input type="number" step="0.1" id="puntaje_por_pregunta" name="puntaje_por_pregunta"
               value="{{ examen.configuracion.puntaje_por_pregunta if examen.configuracion else 1.0 }}">
    </div>
    <button type="submit">Guardar cambios</button>
    <a href="{{ url_for('examen.listar') }}">Cancelar</a>
</form>
{% endblock %}
